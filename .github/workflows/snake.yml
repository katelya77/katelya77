name: Generate Snake

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Generate contribution snake (gold theme)
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=f6c177&color_dots[0]=ebedf0&color_dots[1]=fde68a&color_dots[2]=fbbf24&color_dots[3]=f59e0b&color_dots[4]=d97706
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=f6c177&color_dots[0]=161b22&color_dots[1]=3d2b00&color_dots[2]=7c5200&color_dots[3]=b87700&color_dots[4]=f6c177

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}